# Production Docker Compose
# Uses production builds without source code mounting

services:
  # ============== Database Services ==============
  postgres:
    image: postgres:16-alpine
    container_name: zs-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zs_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zs_rag}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - zs-rag-network
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: zs-rag-etcd
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - zs-rag-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: zs-rag-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zs-rag-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: zs-rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: zs-rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - zs-rag-network
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: zs-rag-opensearch
    environment:
      cluster.name: zs-rag-cluster
      node.name: zs-rag-opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow\\&timeout=1s >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Backend Service (Production) ==============
  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
      target: production
      args:
        APT_MIRROR: ${APT_MIRROR:-}
    image: ${BACKEND_IMAGE:-zs-rag-backend:prod}
    container_name: zs-rag-backend
    environment:
      APP_NAME: ${APP_NAME:-zs-rag}
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zs_rag}
      # 解析并发上限（超出排队）；DB 连接池需 >= 并发并留余量给普通接口
      DOC_PARSE_MAX_CONCURRENCY: ${DOC_PARSE_MAX_CONCURRENCY:-3}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      CORS_ALLOW_LAN_REGEX: ${CORS_ALLOW_LAN_REGEX:-true}
      REQUEST_ID_HEADER: X-Request-ID
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_CHUNKS: ${OPENSEARCH_INDEX_CHUNKS:-zs_rag_chunks}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # MinerU（PDF/图片解析）。默认关闭；CPU: --profile mineru-cpu，GPU: --profile mineru-gpu + MINERU_BACKEND=vlm-vllm-engine
      MINERU_ENABLED: ${MINERU_ENABLED:-false}
      MINERU_BASE_URL: ${MINERU_BASE_URL:-http://mineru:8000}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_LANG: ${MINERU_LANG:-ch}
      MINERU_TIMEOUT: ${MINERU_TIMEOUT:-300}
      MINERU_FORMATS: ${MINERU_FORMATS:-pdf,png,jpg,jpeg,bmp,tif,tiff,webp,docx,xlsx,xlsm,xls,csv,md,txt}
      # OpenDataLoader PDF（进程内 SDK + JRE，无需 sidecar）
      ODL_ENABLED: ${ODL_ENABLED:-true}
      ODL_DEFAULT_PARSER: ${ODL_DEFAULT_PARSER:-opendataloader}
      ODL_HYBRID: ${ODL_HYBRID:-false}
      ODL_TIMEOUT: ${ODL_TIMEOUT:-120}
      # 宿主机暴露端口（供系统设置「服务组件状态」展示与浏览器快速访问）
      POSTGRES_EXPOSED_PORT: ${POSTGRES_PORT:-5432}
      MILVUS_EXPOSED_PORT: ${MILVUS_PORT:-19530}
      MILVUS_WEB_EXPOSED_PORT: 9091
      MINIO_CONSOLE_EXPOSED_PORT: 9001
      OPENSEARCH_EXPOSED_PORT: ${OPENSEARCH_PORT:-9200}
      NEO4J_HTTP_EXPOSED_PORT: ${NEO4J_HTTP_PORT:-7474}
      BACKEND_EXPOSED_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_EXPOSED_PORT: ${FRONTEND_PORT:-80}
      FRONTEND_CONTAINER_PORT: 80
      MINERU_EXPOSED_PORT: ${MINERU_PORT:-8001}
      ODL_HYBRID_EXPOSED_PORT: ${ODL_HYBRID_PORT:-5002}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 原始文档与解析产物持久化（storage_type=local）；缺此卷则容器重建会丢失已上传文件
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== MinerU CPU（服务名 mineru，兼容旧部署；profile：mineru / mineru-cpu）====
  mineru:
    profiles: ["mineru", "mineru-cpu"]
    # 须为完整仓库路径（.env：MINERU_CPU_IMAGE=192.168.252.252:5566/zs-rag/mineru:cpu-offline）
    image: ${MINERU_CPU_IMAGE}
    container_name: ${MINERU_CONTAINER_NAME:-zs-rag-mineru}
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-local}
    # 勿挂载 mineru_models 卷：空卷会盖住镜像内 /models（cpu-offline 已内置模型）
    # 若使用 mineru:cpu 在线下载，可改用 override 或自行加回 volumes: mineru_models:/models
    ports:
      - "${MINERU_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== MinerU GPU（profile mineru-gpu，需 nvidia-container-toolkit）====
  mineru-gpu:
    profiles: ["mineru-gpu"]
    image: ${MINERU_GPU_IMAGE:-zs-rag-mineru:gpu}
    container_name: zs-rag-mineru-gpu
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-modelscope}
      NVIDIA_VISIBLE_DEVICES: ${MINERU_GPU_DEVICES:-0}
    volumes:
      - mineru_models_gpu:/models
    ports:
      - "${MINERU_GPU_PORT:-8002}:8000"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 900s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Frontend Service (Production) ==============
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: ${FRONTEND_IMAGE:-zs-rag-frontend:prod}
    container_name: zs-rag-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - zs-rag-network
    restart: unless-stopped

# ============== Volumes ==============
volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  opensearch_data:
  backend_storage:
  mineru_models:
  mineru_models_gpu:

# ============== Networks ==============
networks:
  zs-rag-network:
    driver: bridge
