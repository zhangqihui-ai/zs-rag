# Production Docker Compose
# Uses production builds without source code mounting

services:
  # ============== Database Services ==============
  postgres:
    image: postgres:16-alpine
    container_name: zs-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zs_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zs_rag}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - zs-rag-network
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: zs-rag-etcd
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - zs-rag-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: zs-rag-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zs-rag-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: zs-rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26-community
    container_name: zs-rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - zs-rag-network
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: zs-rag-opensearch
    environment:
      cluster.name: zs-rag-cluster
      node.name: zs-rag-opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow\\&timeout=1s >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Backend Service (Production) ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: zs-rag-backend
    environment:
      APP_NAME: ${APP_NAME:-zs-rag}
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zs_rag}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      REQUEST_ID_HEADER: X-Request-ID
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_CHUNKS: ${OPENSEARCH_INDEX_CHUNKS:-zs_rag_chunks}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Frontend Service (Production) ==============
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: production
    container_name: zs-rag-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - zs-rag-network
    restart: unless-stopped

# ============== Volumes ==============
volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  opensearch_data:

# ============== Networks ==============
networks:
  zs-rag-network:
    driver: bridge
