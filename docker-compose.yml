services:
  # ============== Database Services ==============
  postgres:
    image: postgres:16
    container_name: zs-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zs_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zs_rag}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - zs-rag-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: zs-rag-etcd
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - zs-rag-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: zs-rag-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zs-rag-network

  milvus:
    image: milvusdb/milvus:v2.5.6
    container_name: zs-rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - zs-rag-network

  neo4j:
    image: neo4j:5.26
    container_name: zs-rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - zs-rag-network

  # ============== OpenSearch (BM25 全文检索，单节点) ==============
  # 应用侧索引/查询接入见后续迭代；此处先编排服务与数据卷。
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: zs-rag-opensearch
    environment:
      cluster.name: zs-rag-cluster
      node.name: zs-rag-opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow\\&timeout=1s >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Backend Service ==============
  backend:
    build:
      context: ./backend
      # 离线/内网构建请使用 Dockerfile.local，并预先在 backend/offline_deps/ 放入 pip download 的包
      # 示例：BACKEND_DOCKERFILE=Dockerfile.local docker compose up -d --build
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
      target: ${BACKEND_TARGET:-development}
      args:
        APT_MIRROR: ${APT_MIRROR:-}
    container_name: zs-rag-backend
    environment:
      APP_NAME: ${APP_NAME:-zs-rag}
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-zs_rag}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.11.19,http://192.168.11.19:80,http://192.168.11.19:5173}
      REQUEST_ID_HEADER: X-Request-ID
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      # OpenSearch：BM25 全文检索（与 Milvus 向量并行；未接代码前仅容器就绪）
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_CHUNKS: ${OPENSEARCH_INDEX_CHUNKS:-zs_rag_chunks}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      # MinerU（PDF/图片解析）。默认关闭；启用时务必配合 --profile mineru 拉起 mineru 服务
      MINERU_ENABLED: ${MINERU_ENABLED:-false}
      MINERU_BASE_URL: ${MINERU_BASE_URL:-http://mineru:8000}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_LANG: ${MINERU_LANG:-ch}
      MINERU_TIMEOUT: ${MINERU_TIMEOUT:-300}
      MINERU_FORMATS: ${MINERU_FORMATS:-pdf,png,jpg,jpeg,bmp,tif,tiff,webp}
      # OpenDataLoader PDF（默认 PDF 引擎；进程内 Python SDK + JVM，无需 HTTP sidecar）
      ODL_ENABLED: ${ODL_ENABLED:-true}
      ODL_DEFAULT_PARSER: ${ODL_DEFAULT_PARSER:-opendataloader}
      ODL_HYBRID: ${ODL_HYBRID:-false}
      ODL_HYBRID_URL: ${ODL_HYBRID_URL:-http://opendataloader-hybrid:5002}
      ODL_TIMEOUT: ${ODL_TIMEOUT:-120}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Mount source code for development (hot reload)
      - ./backend:/app
      # Prevent __pycache__ from being created in host
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== MinerU Sidecar (PDF / 图片解析；按 profile 启用) ==============
  # 拉起方式：docker compose --profile mineru up -d mineru
  # 同时在 .env 中把 MINERU_ENABLED=true，backend 会自动走 MinerU；失败会降级 pypdf
  mineru:
    profiles: ["mineru"]
    build:
      context: ./backend
      dockerfile: Dockerfile.mineru-cpu
    image: ${MINERU_IMAGE:-zs-rag-mineru:cpu}
    container_name: zs-rag-mineru
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-modelscope}
    volumes:
      - mineru_models:/models
    # 如需 GPU VLM 模式：用官方镜像 mineru:latest 并加 deploy.resources + MINERU_BACKEND=vlm-vllm-engine
    ports:
      - "${MINERU_PORT:-8001}:8000"
    healthcheck:
      # 首次启动会下载模型（~数 GB），start_period 放宽到 10 分钟
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== OpenDataLoader Hybrid Sidecar（扫描件 / 复杂表格；按 profile 启用） ==============
  # 拉起：docker compose --profile odl-hybrid up -d opendataloader-hybrid
  # 知识库配置开启 pdf_parser_hybrid 或 .env ODL_HYBRID=true
  opendataloader-hybrid:
    profiles: ["odl-hybrid"]
    image: python:3.12-slim
    container_name: zs-rag-odl-hybrid
    working_dir: /srv
    command:
      - sh
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq --no-install-recommends default-jre-headless curl \
        && pip install -q --no-cache-dir 'opendataloader-pdf[hybrid]' \
        && opendataloader-pdf-hybrid --host 0.0.0.0 --port 5002
    ports:
      - "${ODL_HYBRID_PORT:-5002}:5002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5002/health >/dev/null || curl -fsS http://localhost:5002/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Frontend Service ==============
  frontend:
    image: node:20-alpine
    container_name: zs-rag-frontend
    working_dir: /app
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://192.168.11.19:8000}
      # 大 PDF 下载超时（毫秒），默认 3 分钟
      - VITE_FILE_DOWNLOAD_TIMEOUT_MS=${VITE_FILE_DOWNLOAD_TIMEOUT_MS:-180000}
      - NODE_ENV=development
    ports:
      - "${FRONTEND_PORT:-80}:5173"
    volumes:
      # Mount source code for development (hot reload)
      - ./web:/app
      # Prevent node_modules from being created in host
      - /app/node_modules
    # 使用匿名卷 /app/node_modules 时，旧卷里可能缺少新加的依赖；npm ci 按 lock 全量重装更可靠
    command: sh -c "(npm ci || npm install) && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    networks:
      - zs-rag-network
    restart: unless-stopped

# ============== Volumes ==============
volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  opensearch_data:
  mineru_models:

# ============== Networks ==============
networks:
  zs-rag-network:
    driver: bridge
