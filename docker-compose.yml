services:
  # ============== Database Services ==============
  postgres:
    image: postgres:16
    container_name: zs-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zs_rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zs_rag}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - zs-rag-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: zs-rag-etcd
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - zs-rag-network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: zs-rag-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - zs-rag-network

  milvus:
    image: milvusdb/milvus:v2.5.6
    container_name: zs-rag-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - zs-rag-network

  neo4j:
    image: neo4j:5.26
    container_name: zs-rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - zs-rag-network

  # ============== OpenSearch (BM25 全文检索，单节点) ==============
  # 应用侧索引/查询接入见后续迭代；此处先编排服务与数据卷。
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: zs-rag-opensearch
    environment:
      cluster.name: zs-rag-cluster
      node.name: zs-rag-opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "false"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "${OPENSEARCH_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow\\&timeout=1s >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Backend Service ==============
  backend:
    build:
      context: ./backend
      # 离线/内网构建请使用 Dockerfile.local，并预先在 backend/offline_deps/ 放入 pip download 的包
      # 示例：BACKEND_DOCKERFILE=Dockerfile.local docker compose up -d --build
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
      target: ${BACKEND_TARGET:-development}
      args:
        APT_MIRROR: ${APT_MIRROR:-}
    image: ${BACKEND_IMAGE:-zs-rag-backend}
    container_name: zs-rag-backend
    environment:
      APP_NAME: ${APP_NAME:-zs-rag}
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-zs_rag}
      # 解析并发上限（超出排队）；DB 连接池需 >= 并发并留余量给普通接口
      DOC_PARSE_MAX_CONCURRENCY: ${DOC_PARSE_MAX_CONCURRENCY:-3}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.11.19,http://192.168.11.19:80,http://192.168.11.19:5173}
      REQUEST_ID_HEADER: X-Request-ID
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      # OpenSearch：BM25 全文检索（与 Milvus 向量并行；未接代码前仅容器就绪）
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX_CHUNKS: ${OPENSEARCH_INDEX_CHUNKS:-zs_rag_chunks}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # MinerU（PDF/图片解析）。默认关闭；启用时务必配合 --profile mineru 拉起 mineru 服务
      MINERU_ENABLED: ${MINERU_ENABLED:-false}
      MINERU_BASE_URL: ${MINERU_BASE_URL:-http://mineru-cpu:8000}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_LANG: ${MINERU_LANG:-ch}
      MINERU_TIMEOUT: ${MINERU_TIMEOUT:-300}
      MINERU_FORMATS: ${MINERU_FORMATS:-pdf,png,jpg,jpeg,bmp,tif,tiff,webp,docx,xlsx,xlsm,xls,csv,md,txt}
      # OpenDataLoader PDF（默认 PDF 引擎；进程内 Python SDK + JVM，无需 HTTP sidecar）
      ODL_ENABLED: ${ODL_ENABLED:-true}
      ODL_DEFAULT_PARSER: ${ODL_DEFAULT_PARSER:-opendataloader}
      ODL_HYBRID: ${ODL_HYBRID:-false}
      ODL_HYBRID_URL: ${ODL_HYBRID_URL:-http://opendataloader-hybrid:5002}
      ODL_TIMEOUT: ${ODL_TIMEOUT:-120}
      # 宿主机暴露端口（供系统设置「服务组件状态」判断是否可浏览器访问）
      POSTGRES_EXPOSED_PORT: ${POSTGRES_PORT:-5432}
      MILVUS_EXPOSED_PORT: ${MILVUS_PORT:-19530}
      MILVUS_WEB_EXPOSED_PORT: 9091
      MINIO_CONSOLE_EXPOSED_PORT: 9001
      OPENSEARCH_EXPOSED_PORT: ${OPENSEARCH_PORT:-9200}
      NEO4J_HTTP_EXPOSED_PORT: ${NEO4J_HTTP_PORT:-7474}
      BACKEND_EXPOSED_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_EXPOSED_PORT: ${FRONTEND_PORT:-80}
      FRONTEND_CONTAINER_PORT: 5173
      MINERU_EXPOSED_PORT: ${MINERU_PORT:-8001}
      ODL_HYBRID_EXPOSED_PORT: ${ODL_HYBRID_PORT:-5002}
      REDIS_EXPOSED_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_ENABLED: ${CELERY_ENABLED:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      CHAT_API_RATE_LIMIT_PER_MINUTE: ${CHAT_API_RATE_LIMIT_PER_MINUTE:-120}
      AUTH_LOGIN_RATE_LIMIT_PER_MINUTE: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:-30}
      EMBED_API_KEY_DAILY_QUOTA: ${EMBED_API_KEY_DAILY_QUOTA:-5000}
      SPACE_MAX_DOCUMENTS: ${SPACE_MAX_DOCUMENTS:-0}
      SPACE_MAX_STORAGE_BYTES: ${SPACE_MAX_STORAGE_BYTES:-0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Mount source code for development (hot reload)
      - ./backend:/app
      # Prevent __pycache__ from being created in host
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # 与 backend 共用同一镜像，仅启动命令不同（无需单独 build / push celery 镜像）
  celery-worker:
    image: ${BACKEND_IMAGE:-zs-rag-backend}
    container_name: zs-rag-celery-worker
    command: python -m celery -A app.worker.tasks worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-zs_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_ENABLED: ${CELERY_ENABLED:-true}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - zs-rag-network
    restart: unless-stopped
    profiles:
      - celery

  # ============== MinerU CPU（pipeline；profile mineru / mineru-cpu）==============
  # .env：MINERU_ENABLED=true，MINERU_BASE_URL=http://mineru-cpu:8000（或 http://mineru:8000 + offline 覆盖别名）
  # 与 115 一致用 cpu-offline 镜像：加 -f docker-compose.mineru-offline.yml，见该文件说明
  mineru-cpu:
    profiles: ["mineru", "mineru-cpu"]
    build:
      context: ./backend
      dockerfile: Dockerfile.mineru-cpu
    image: ${MINERU_CPU_IMAGE:-zs-rag-mineru:cpu}
    container_name: zs-rag-mineru-cpu
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-modelscope}
    volumes:
      - mineru_models:/models
    ports:
      - "${MINERU_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== MinerU GPU（VLM + vLLM；profile mineru-gpu，需 NVIDIA T4+）======
  # .env：MINERU_ENABLED=true，MINERU_BASE_URL=http://mineru-gpu:8000，MINERU_BACKEND=vlm-vllm-engine
  # 拉起：docker compose --profile mineru-gpu up -d mineru-gpu
  mineru-gpu:
    profiles: ["mineru-gpu"]
    build:
      context: ./backend
      dockerfile: Dockerfile.mineru-gpu
      args:
        VLLM_BASE_IMAGE: ${MINERU_VLLM_BASE_IMAGE:-vllm/vllm-openai:v0.11.2}
    image: ${MINERU_GPU_IMAGE:-zs-rag-mineru:gpu}
    container_name: zs-rag-mineru-gpu
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-modelscope}
      NVIDIA_VISIBLE_DEVICES: ${MINERU_GPU_DEVICES:-0}
    volumes:
      - mineru_models_gpu:/models
    ports:
      - "${MINERU_GPU_PORT:-8002}:8000"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || curl -fsS http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 900s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== OpenDataLoader Hybrid Sidecar（扫描件 / 复杂表格；按 profile 启用） ==============
  # 拉起（内网/offline 必用预构建镜像，勿用下方默认 python:3.12-slim 在线安装）：
  #   docker build -f backend/Dockerfile.odl-hybrid -t zs-rag-odl-hybrid:latest backend
  #   docker compose -f docker-compose.yml -f docker-compose.odl-hybrid.yml \
  #     --profile odl-hybrid up -d --no-build opendataloader-hybrid
  # 知识库配置开启 pdf hybrid 或 .env ODL_HYBRID=true
  opendataloader-hybrid:
    profiles: ["odl-hybrid"]
    build:
      context: ./backend
      dockerfile: Dockerfile.odl-hybrid
    image: ${ODL_HYBRID_IMAGE:-zs-rag-odl-hybrid:latest}
    container_name: zs-rag-odl-hybrid
    ports:
      - "${ODL_HYBRID_PORT:-5002}:5002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5002/health >/dev/null || curl -fsS http://localhost:5002/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - zs-rag-network
    restart: unless-stopped

  # ============== Frontend Service ==============
  frontend:
    image: node:20-alpine
    container_name: zs-rag-frontend
    working_dir: /app
    environment:
      # 留空时浏览器走同源，Vite dev proxy 转发到 backend:8000（见 web/vite.config.ts）
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
      # 大 PDF 下载超时（毫秒），默认 3 分钟
      - VITE_FILE_DOWNLOAD_TIMEOUT_MS=${VITE_FILE_DOWNLOAD_TIMEOUT_MS:-180000}
      - NODE_ENV=development
    ports:
      - "${FRONTEND_PORT:-80}:5173"
    volumes:
      # Mount source code for development (hot reload)
      - ./web:/app
      # Prevent node_modules from being created in host
      - /app/node_modules
    # 使用匿名卷 /app/node_modules 时，旧卷里可能缺少新加的依赖；npm ci 按 lock 全量重装更可靠
    command: sh -c "(npm ci || npm install) && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    networks:
      - zs-rag-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zs-rag-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - zs-rag-network
    restart: unless-stopped

# ============== Volumes ==============
volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  opensearch_data:
  mineru_models:
  mineru_models_gpu:

# ============== Networks ==============
networks:
  zs-rag-network:
    driver: bridge
